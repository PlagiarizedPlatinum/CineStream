<script>
(function(){
  if(!('serviceWorker' in navigator))return;
  navigator.serviceWorker.register('/sw.js',{scope:'/',updateViaCache:'none'})
    .then(function(reg){
      // If a new SW is waiting, activate it only after full page load + settle.
      // Never activate mid-load — causes in-flight fetch crashes.
      function activateWaiting(sw){
        function doActivate(){ sw.postMessage('SKIP_WAITING'); }
        if(document.readyState==='complete'){ setTimeout(doActivate,100); }
        else { window.addEventListener('load',function(){ setTimeout(doActivate,100); },{once:true}); }
      }
      if(reg.waiting) activateWaiting(reg.waiting);
      reg.addEventListener('updatefound',function(){
        var sw=reg.installing; if(!sw) return;
        sw.addEventListener('statechange',function(){ if(sw.state==='installed') activateWaiting(sw); });
      });
    }).catch(function(){});
})();
</script>

<style>
:root {
  --nf-black: #000;
  --nf-bg: #141414;
  --nf-surface: #181818;
  --nf-card: #2f2f2f;
  --nf-border: #2f2f2f;
  --nf-red: #e50914;
  --nf-red-hover: #f6121d;
  --nf-text: #fff;
  --nf-text-dim: #b3b3b3;
  --nf-text-muted: #8c8c8c;
  --radius: 4px;
  --transition: 0.15s ease;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--nf-bg);
  color: var(--nf-text);
  font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
img { display: block; max-width: 100%; }
button { cursor: pointer; }
a { text-decoration: none; color: inherit; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

/* ANIMATIONS */
@keyframes fadeIn  { from{opacity:0} to{opacity:1} }
@keyframes fadeUp  { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
@keyframes scaleIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
@keyframes spin    { to{transform:rotate(360deg)} }
@keyframes shimmer { 0%{background-position:-800px 0} 100%{background-position:800px 0} }

/* HEADER */
#nf-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  height: 68px; padding: 0 4%;
  display: flex; align-items: center; gap: 20px;
  background: linear-gradient(to bottom, rgba(0,0,0,.85) 0%, transparent 100%);
  transition: background 0.3s ease;
}
#nf-header.scrolled { background: var(--nf-black); }
.nf-logo {
  font-size: 26px; font-weight: 900; color: var(--nf-red);
  letter-spacing: -1px; white-space: nowrap; flex-shrink: 0;
  text-transform: uppercase;
}
.header-back {
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; color: var(--nf-text-dim);
  background: none; border: none; cursor: pointer;
  transition: color var(--transition); padding: 4px 0;
}
.header-back:hover { color: #fff; }
.header-back svg { width: 20px; height: 20px; fill: currentColor; }

/* HERO BACKDROP */
.detail-hero {
  position: relative; min-height: 100vh;
  display: flex; align-items: flex-end;
}
.hero-backdrop {
  position: fixed; inset: 0; z-index: -1;
  background-size: cover; background-position: center top;
  transition: background-image 0.5s ease;
}
.hero-backdrop::after {
  content: ''; position: absolute; inset: 0;
  background:
    linear-gradient(to right, rgba(20,20,20,.98) 0%, rgba(20,20,20,.7) 45%, rgba(20,20,20,.1) 100%),
    linear-gradient(to top, var(--nf-bg) 0%, rgba(20,20,20,.6) 30%, transparent 60%);
}
.detail-content {
  position: relative; z-index: 10; width: 55%; min-width: 300px; max-width: 700px;
  padding: 140px 4% 40px;
  animation: fadeUp .6s ease;
}
.detail-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: var(--nf-red); margin-bottom: 12px;
}
.detail-title {
  font-size: clamp(36px, 6vw, 72px); font-weight: 900; line-height: 1;
  margin-bottom: 16px; text-shadow: 2px 4px 16px rgba(0,0,0,.6);
  letter-spacing: -1px;
}
.detail-tagline {
  font-size: 16px; font-style: italic; color: var(--nf-text-dim);
  margin-bottom: 20px; font-weight: 400;
}
.detail-meta {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  margin-bottom: 20px; font-size: 14px;
}
.meta-rating { color: #46d369; font-weight: 700; font-size: 16px; }
.meta-year { color: var(--nf-text-dim); }
.meta-runtime { color: var(--nf-text-dim); }
.meta-lang { color: var(--nf-text-dim); font-size: 12px; border: 1px solid #666; padding: 1px 6px; }
.meta-certified {
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.3);
  font-size: 11px; font-weight: 700; letter-spacing: 1px; padding: 2px 7px;
}
.detail-genres {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px;
}
.detail-genre-tag {
  font-size: 11px; color: #b3b3b3; border: 1px solid #555;
  padding: 3px 10px; border-radius: 12px;
}
.detail-overview {
  font-size: 16px; line-height: 1.75; color: rgba(255,255,255,.9);
  max-width: 560px; margin-bottom: 28px;

}
.detail-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 32px; }
.nf-btn-play {
  display: inline-flex; align-items: center; gap: 8px;
  background: #fff; color: #000; border: none;
  font-size: 16px; font-weight: 700; padding: 12px 32px;
  border-radius: var(--radius); transition: background var(--transition);
  white-space: nowrap; min-width: 120px;
}
.nf-btn-play svg { width: 22px; height: 22px; fill: #000; }
.nf-btn-play:hover { background: rgba(255,255,255,.75); }
.nf-btn-mylist {

.nf-btn-icon:hover { border-color: #fff; background: rgba(42,42,42,.8); }
.detail-crew {
  font-size: 14px; color: var(--nf-text-dim); line-height: 2;
}
.detail-crew span { color: #fff; font-weight: 500; }

/* LOWER PANEL */
.detail-lower {

/* EPISODES */

.season-select-label { font-size: 22px; font-weight: 700; }
.season-dropdown {

.ep-thumb img { width: 100%; height: 100%; object-fit: cover; }
.ep-thumb-play {

.ep-info { flex: 1; min-width: 0; }
.ep-header { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
.ep-title { font-size: 15px; font-weight: 600; }
.ep-runtime { font-size: 13px; color: var(--nf-text-muted); flex-shrink: 0; }

/* CAST */

.related-card {

/* DETAILS INFO BOX */

/* PLAYER MODAL */
.player-modal {

.player-title { font-size: 18px; font-weight: 700; }
.player-subtitle { font-size: 12px; color: var(--nf-text-muted); margin-top: 2px; }
.player-close { background: none; border: 1px solid #444; color: #aaa; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all var(--transition); }
.player-close:hover { color: #fff; border-color: #fff; }
.player-wrap { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; }
.player-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
.source-switcher { display: flex; gap: 6px; padding: 12px 20px; background: #181818; border-top: 1px solid #2f2f2f; flex-wrap: wrap; align-items: center; }

.src-btn:hover { color: #fff; border-color: #666; }
.src-btn.active { background: var(--nf-red); color: #fff; border-color: var(--nf-red); font-weight: 700; }
.episode-selector { display: flex; gap: 12px; align-items: center; padding: 10px 20px; background: #181818; border-top: 1px solid #2f2f2f; flex-wrap: wrap; }
.ep-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--nf-text-muted); }
.ep-select { background: #333; border: 1px solid #444; color: #fff; font-size: 13px; padding: 6px 12px; border-radius: var(--radius); outline: none; }
.ep-select:focus { border-color: var(--nf-red); }

/* TOAST */
#toast-container { position: fixed; bottom: 24px; right: 20px; z-index: 9000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { background: #333; color: #fff; border-radius: 4px; padding: 12px 16px; font-size: 13px; box-shadow: 0 4px 12px rgba(0,0,0,.5); animation: fadeUp .3s ease; min-width: 200px; border-left: 3px solid #555; }
.toast-success { border-left-color: #46d369; color: #46d369; }
.toast-exit { opacity: 0; transform: translateX(20px); transition: all .3s ease; }

/* LOADING */
.loading-state { display: flex; align-items: center; justify-content: center; padding: 48px 24px; gap: 12px; color: var(--nf-text-muted); font-size: 13px; }
.spinner { width: 20px; height: 20px; border: 2px solid #333; border-top-color: var(--nf-red); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
.no-poster { width: 100%; background: #2f2f2f; display: flex; align-items: center; justify-content: center; color: #666; font-size: 12px; text-align: center; padding: 16px; }

/* SKELETON */
.nf-skeleton { background: linear-gradient(90deg, #222 25%, #2f2f2f 37%, #222 63%); background-size: 800px 100%; animation: shimmer 1.5s ease infinite; border-radius: var(--radius); }

/* RESPONSIVE */
@media (max-width: 768px) {
  #nf-header { height: 52px; padding: 0 16px; }
  .detail-content { width: 100%; padding: 80px 16px 28px; }
  .detail-title { font-size: clamp(26px, 8vw, 48px); }
  .detail-overview { font-size: 14px; }
  .nf-btn-play, .nf-btn-mylist { font-size: 14px; padding: 10px 20px; }
  .detail-lower { padding: 0 16px 40px; }
  .detail-info-box { grid-template-columns: 1fr; gap: 0; }
  .cast-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 12px; }
  .related-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .ep-thumb { flex: 0 0 90px; height: 51px; }
  .hero-backdrop::after {
    background:
      linear-gradient(to bottom, rgba(20,20,20,.3) 0%, rgba(20,20,20,.7) 50%, var(--nf-bg) 100%);
  }
}
</style>

<script>
'use strict';

/* ═══════════════════════════════════════════════════
   AD BLOCK
═══════════════════════════════════════════════════ */
(function adBlock(){
  const _noop=()=>null;
  window.open=_noop;
  try{Object.defineProperty(window,'open',{value:_noop,writable:false,configurable:false});}catch(_){}
  try{Object.defineProperty(window,'opener',{get:()=>null,set:()=>{},configurable:false});}catch(_){}
  (function lockLocation(){
    const _replace=location.replace.bind(location);
    const sameOrigin=(url)=>{try{return new URL(url,location.href).origin===location.origin;}catch(_){return false;}};
    try{location.replace=(url)=>{if(sameOrigin(url))_replace(url);};}catch(_){}
    try{location.assign=(url)=>{if(sameOrigin(url))window.location.assign(url);};}catch(_){}
  })();
  document.addEventListener('click',function(e){
    const a=e.target.closest('a[href]');
    if(!a)return;
    try{const u=new URL(a.href,location.href);if(u.origin!==location.origin){e.preventDefault();}}catch(_){}
  },true);
})();

/* ═══════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════ */
const TMDB_KEY='8265bd1679663a7ea12ac168da84d2e8';
const IMG_BASE='https://image.tmdb.org/t/p/';
const SETTINGS_KEY='cs_settings_v3';
const WATCHLIST_KEY='cs_watchlist_v1';

// Check auth
(function checkAuth(){
  const LS_KEY='cs_auth_v2';
  const hash=localStorage.getItem(LS_KEY);
  if(!hash){window.location.href='/';return;}
})();

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let mediaId=null,mediaType=null,mediaData=null,currentSeason=1,currentEpisode=1;
let currentSource='vidsrc';

/* ═══════════════════════════════════════════════════
   SETTINGS
═══════════════════════════════════════════════════ */
try{const s=JSON.parse(localStorage.getItem(SETTINGS_KEY)||'null');if(s){currentSource=s.source||'vidsrc';if(s.accent)document.documentElement.style.setProperty('--nf-red',s.accent);}}catch(_){}

/* ═══════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════ */
function showToast(msg,type='',dur=2500){
  const c=document.getElementById('toast-container');if(!c)return;
  const t=document.createElement('div');t.className=`toast${type?' toast-'+type:''}`;t.textContent=msg;
  c.appendChild(t);
  setTimeout(()=>{t.classList.add('toast-exit');setTimeout(()=>t.remove(),350);},dur);
}

/* ═══════════════════════════════════════════════════
   WATCHLIST
═══════════════════════════════════════════════════ */
function getWatchlist(){try{return JSON.parse(localStorage.getItem(WATCHLIST_KEY)||'[]');}catch(_){return[];}}
function saveWatchlist(list){try{localStorage.setItem(WATCHLIST_KEY,JSON.stringify(list));}catch(_){}}
function isInWatchlist(id,type){return getWatchlist().some(i=>String(i.id)===String(id)&&i.type===type);}
function toggleWatchlist(item){
  let list=getWatchlist();
  const idx=list.findIndex(i=>String(i.id)===String(item.id)&&i.type===item.type);
  if(idx>=0){list.splice(idx,1);showToast('Removed from My List');}
  else{list.unshift({...item,added:Date.now()});showToast('Added to My List','success');}
  saveWatchlist(list);
  refreshWlBtn();
}
function refreshWlBtn(){
  const btn=document.getElementById('wl-btn');if(!btn)return;
  const inList=isInWatchlist(mediaId,mediaType);
  btn.innerHTML=inList?
    `<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> In My List`:
    `<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg> My List`;
  btn.classList.toggle('in-list',inList);
}

/* ═══════════════════════════════════════════════════
   TMDB FETCH
═══════════════════════════════════════════════════ */
const _cache=new Map();
async function tmdb(path,extra={}){
  const key=path+JSON.stringify(extra);
  if(_cache.has(key))return _cache.get(key);
  const[basePath,pathQ]=path.split('?');
  let proxyUrl=`/api/tmdb?path=${encodeURIComponent(basePath)}${pathQ?'&'+pathQ:''}`;
  for(const[k,v] of Object.entries(extra))proxyUrl+=`&${k}=${encodeURIComponent(v)}`;
  let json;
  try{const res=await fetch(proxyUrl);if(res.ok)json=await res.json();else throw new Error(`${res.status}`);}
  catch(_){
    const directUrl=`https://api.themoviedb.org/3${path}${path.includes('?')?'&':'?'}api_key=${TMDB_KEY}&language=en-US`;
    const res=await fetch(directUrl);if(!res.ok)throw new Error(`TMDB ${res.status}`);json=await res.json();
  }
  _cache.set(key,json);setTimeout(()=>_cache.delete(key),300000);return json;
}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function posterUrl(p,size='w342'){return p?`${IMG_BASE}${size}${p}`:null;}
function backdropUrl(p,size='original'){return p?`${IMG_BASE}${size}${p}`:null;}
function formatRuntime(mins){if(!mins)return null;const h=Math.floor(mins/60),m=mins%60;return h?`${h}h ${m}m`:`${m}m`;}
function formatNumber(n){if(!n)return '—';if(n>=1e9)return (n/1e9).toFixed(1)+'B';if(n>=1e6)return (n/1e6).toFixed(1)+'M';if(n>=1e3)return (n/1e3).toFixed(0)+'K';return n.toString();}

/* ═══════════════════════════════════════════════════
   SOURCES
═══════════════════════════════════════════════════ */
function frameUrl(raw){return `/api/frame?url=${encodeURIComponent(raw)}`;}
const SOURCES=[
  {key:'vidsrc',    label:'VidSrc',    movie:id=>`https://vidsrc.cc/v2/embed/movie/${id}`,               tv:(id,s,e)=>`https://vidsrc.cc/v2/embed/tv/${id}/${s}/${e}`},
  {key:'vidsrc2',   label:'VidSrc 2',  movie:id=>`https://vidsrc.to/embed/movie/${id}`,                  tv:(id,s,e)=>`https://vidsrc.to/embed/tv/${id}/${s}/${e}`},
  {key:'vidsrcme',  label:'VidSrc 3',  movie:id=>`https://vidsrc.me/embed/movie?tmdb=${id}`,             tv:(id,s,e)=>`https://vidsrc.me/embed/tv?tmdb=${id}&season=${s}&episode=${e}`},
  {key:'vidsrcicu', label:'VidSrc ICU',movie:id=>`https://vidsrc.icu/embed/movie/${id}`,                 tv:(id,s,e)=>`https://vidsrc.icu/embed/tv/${id}/${s}/${e}`},
  {key:'videasy',   label:'Videasy',   movie:id=>`https://player.videasy.net/movie/${id}`,                tv:(id,s,e)=>`https://player.videasy.net/tv/${id}/${s}/${e}`},
  {key:'autoembed', label:'AutoEmbed', movie:id=>`https://player.autoembed.cc/embed/movie/${id}`,         tv:(id,s,e)=>`https://player.autoembed.cc/embed/tv/${id}/${s}/${e}`},
  {key:'superembed',label:'SuperEmbed',movie:id=>`https://multiembed.mov/?video_id=${id}&tmdb=1`,         tv:(id,s,e)=>`https://multiembed.mov/?video_id=${id}&tmdb=1&s=${s}&e=${e}`},
  {key:'vsembed',   label:'Embed.su',  movie:id=>`https://embed.su/embed/movie/${id}`,                   tv:(id,s,e)=>`https://embed.su/embed/tv/${id}/${s}/${e}`},
  {key:'vidlink',   label:'VidLink',   movie:id=>`https://vidlink.pro/movie/${id}?autoplay=true`,         tv:(id,s,e)=>`https://vidlink.pro/tv/${id}/${s}/${e}?autoplay=true`},
  {key:'2embed',    label:'2Embed',    movie:id=>`https://www.2embed.stream/embed/movie/${id}`,           tv:(id,s,e)=>`https://www.2embed.stream/embed/tv/${id}/${s}/${e}`},
  {key:'rive',      label:'Rive',      movie:id=>`https://rive.su/embed/movie?tmdb=${id}`,               tv:(id,s,e)=>`https://rive.su/embed/tv?tmdb=${id}&season=${s}&episode=${e}`},
  {key:'vidfast',   label:'VidFast',   movie:id=>`https://vidfast.pro/movie/${id}?autoPlay=true`,         tv:(id,s,e)=>`https://vidfast.pro/tv/${id}/${s}/${e}?autoPlay=true`},
  {key:'pstream',   label:'pStream',   movie:id=>`https://iframe.pstream.org/media/tmdb-movie-${id}`,    tv:(id,s,e)=>`https://iframe.pstream.org/media/tmdb-tv-${id}-${s}-${e}`},
  {key:'vidora',    label:'Vidora',    movie:id=>`https://vidora.su/movie/${id}`,                        tv:(id,s,e)=>`https://vidora.su/tv/${id}/${s}/${e}`},
];

function getPlayerUrl(type,id,season,episode){
  const src=SOURCES.find(s=>s.key===currentSource)||SOURCES[0];
  const raw=type==='movie'?src.movie(id):src.tv(id,season||1,episode||1);
  return frameUrl(raw);
}
function resetSourceSwitcher(){
  const sw=document.getElementById('source-switcher');
  sw.innerHTML='<span class="source-label">Source</span>';
  SOURCES.forEach(({key,label})=>{
    const btn=document.createElement('button');btn.className=`src-btn${key===currentSource?' active':''}`;
    btn.textContent=label;btn.dataset.src=key;
    btn.addEventListener('click',()=>{
      currentSource=key;
      document.querySelectorAll('#source-switcher .src-btn').forEach(b=>b.classList.toggle('active',b.dataset.src===key));
      setPlayerSrcFromState();
    });
    sw.appendChild(btn);
  });
}
let playerState={type:null,id:null,season:1,episode:1};
function setPlayerSrcFromState(){
  const url=getPlayerUrl(playerState.type,playerState.id,playerState.season,playerState.episode);
  document.getElementById('player-iframe').src=url;
}
function openPlayer(){document.getElementById('player-modal').classList.add('active');document.body.style.overflow='hidden';}
function closePlayer(){document.getElementById('player-modal').classList.remove('active');document.getElementById('player-iframe').src='';document.body.style.overflow='';}

/* ═══════════════════════════════════════════════════
   PLAY MOVIE
═══════════════════════════════════════════════════ */
function playNow(){
  if(!mediaData)return;
  playerState.type=mediaType;playerState.id=mediaId;playerState.season=currentSeason;playerState.episode=currentEpisode;
  const title=mediaData.title||mediaData.name||'';
  document.getElementById('player-title').textContent=title;
  if(mediaType==='movie'){
    document.getElementById('player-subtitle').textContent=(mediaData.release_date||'').slice(0,4);
    document.getElementById('episode-selector-wrap').style.display='none';
  }else{
    document.getElementById('player-subtitle').textContent=`Season ${currentSeason} · Episode ${currentEpisode}`;
    document.getElementById('episode-selector-wrap').style.display='block';
    // Populate selectors
    const seasons=(mediaData.seasons||[]).filter(s=>s.season_number>0);
    const seasonSel=document.getElementById('season-select');
    seasonSel.innerHTML=seasons.map(s=>`<option value="${s.season_number}"${s.season_number===currentSeason?' selected':''}>${esc(s.name)}</option>`).join('');
    // Load episodes for current season
    loadEpisodesForPlayer(currentSeason);
  }
  resetSourceSwitcher();
  setPlayerSrcFromState();
  openPlayer();
  // Save to continue
  const CONTINUE_KEY='cs_continue_v1';
  try{
    let list=JSON.parse(localStorage.getItem(CONTINUE_KEY)||'[]');
    const entry={id:mediaId,type:mediaType,title,poster:mediaData.poster_path,backdrop:mediaData.backdrop_path,year:(mediaData.release_date||mediaData.first_air_date||'').slice(0,4),season:currentSeason,episode:currentEpisode,lastWatched:Date.now()};
    const idx=list.findIndex(i=>String(i.id)===String(mediaId)&&i.type===mediaType);
    if(idx>=0)list.splice(idx,1);list.unshift(entry);if(list.length>20)list.length=20;
    localStorage.setItem(CONTINUE_KEY,JSON.stringify(list));
  }catch(_){}
}
async function loadEpisodesForPlayer(season){
  try{
    const data=await tmdb(`/tv/${mediaId}/season/${season}`);
    const epSel=document.getElementById('episode-select');
    epSel.innerHTML=(data.episodes||[]).map(e=>`<option value="${e.episode_number}"${e.episode_number===currentEpisode?' selected':''}>${esc(`Ep ${e.episode_number}: ${e.name}`)}</option>`).join('');
  }catch(_){}
}

/* ═══════════════════════════════════════════════════
   LOAD DETAIL
═══════════════════════════════════════════════════ */
async function loadDetail(){
  const params=new URLSearchParams(window.location.search);
  mediaId=params.get('id');mediaType=params.get('type')||'movie';
  if(!mediaId){document.getElementById('detail-content').innerHTML='<div style="padding:40px;font-size:18px;color:#666">No title specified.</div>';return;}
  try{
    const[detail,credits,videos,related]=await Promise.all([
      tmdb(`/${mediaType}/${mediaId}`),
      tmdb(`/${mediaType}/${mediaId}/credits`),
      tmdb(`/${mediaType}/${mediaId}/videos`),
      mediaType==='movie'?tmdb(`/${mediaType}/${mediaId}/similar`):tmdb(`/${mediaType}/${mediaId}/similar`),
    ]);
    mediaData=detail;
    renderHero(detail);
    renderLower(detail,credits,videos,related);
  }catch(err){
    document.getElementById('detail-content').innerHTML=`<div style="padding:40px"><h2 style="margin-bottom:12px">Failed to load</h2><p style="color:#666">${err.message}</p><a href="/" style="color:#e50914;font-weight:700;display:block;margin-top:16px">← Back to Home</a></div>`;
  }
}

function renderHero(d){
  const title=d.title||d.name||'Unknown';
  const year=(d.release_date||d.first_air_date||'').slice(0,4);
  const backdrop=backdropUrl(d.backdrop_path,'original');
  const runtime=mediaType==='movie'?formatRuntime(d.runtime):null;
  const rating=d.vote_average?.toFixed(1);
  const inList=isInWatchlist(mediaId,mediaType);
  const genres=(d.genres||[]).slice(0,4).map(g=>`<span class="detail-genre-tag">${esc(g.name)}</span>`).join('');

  document.title=`${title} — ReelWave`;
  if(backdrop)document.getElementById('hero-backdrop').style.backgroundImage=`url('${backdrop}')`;

  // Director / creator
  const crew=d.credits?.crew||[];
  const directors=crew.filter(c=>c.job==='Director').map(c=>esc(c.name)).slice(0,3).join(', ');
  const creators=(d.created_by||[]).map(c=>esc(c.name)).join(', ');
  const mainCast=(d.credits?.cast||[]).slice(0,5).map(c=>esc(c.name)).join(', ');

  document.getElementById('detail-content').innerHTML=`
    <div class="detail-badge">
      ${mediaType==='tv'?'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg> Series':'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg> Film'}
    </div>
    <h1 class="detail-title">${esc(title)}</h1>
    ${d.tagline?`<div class="detail-tagline">"${esc(d.tagline)}"</div>`:''}
    <div class="detail-meta">
      ${rating?`<span class="meta-rating">★ ${rating}</span>`:''}
      ${year?`<span class="meta-year">${year}</span>`:''}
      ${runtime?`<span class="meta-runtime">${runtime}</span>`:''}
      ${mediaType==='tv'&&d.number_of_seasons?`<span class="meta-year">${d.number_of_seasons} Season${d.number_of_seasons>1?'s':''}</span>`:''}
      ${mediaType==='tv'&&d.number_of_episodes?`<span class="meta-year">${d.number_of_episodes} Episodes</span>`:''}
      ${d.original_language&&d.original_language!=='en'?`<span class="meta-lang">${d.original_language.toUpperCase()}</span>`:''}
    </div>
    ${genres?`<div class="detail-genres">${genres}</div>`:''}
    <p class="detail-overview">${esc(d.overview||'')}</p>
    <div class="detail-actions">
      <button class="nf-btn-play" onclick="playNow()">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        ${mediaType==='tv'?'Play S1:E1':'Play'}
      </button>
      <button class="nf-btn-mylist${inList?' in-list':''}" id="wl-btn" onclick="toggleWatchlist({id:mediaId,type:mediaType,title:'${esc(title).replace(/'/g,"\\'")}',poster:${d.poster_path?`'${d.poster_path}'`:'null'},year:'${year}',rating:'${rating||''}'})">${inList?
        `<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> In My List`:
        `<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg> My List`}</button>
    </div>
    ${directors?`<div class="detail-crew">Directed by <span>${directors}</span></div>`:''}
    ${creators?`<div class="detail-crew">Created by <span>${creators}</span></div>`:''}
    ${mainCast?`<div class="detail-crew" style="margin-top:4px">Starring <span>${mainCast}</span></div>`:''}
  `;
}

function renderLower(d,credits,videos,related){
  const lower=document.getElementById('detail-lower');
  const tabsEl=document.getElementById('detail-tabs');
  const panelsEl=document.getElementById('detail-tab-panels');
  lower.style.display='';

  // Build tab list
  const tabs=[];
  if(mediaType==='tv')tabs.push({id:'episodes',label:'Episodes'});
  tabs.push({id:'cast',label:'Cast'});
  tabs.push({id:'related',label:'More Like This'});
  tabs.push({id:'details',label:'Details'});

  tabsEl.innerHTML=tabs.map((t,i)=>`<button class="detail-tab-btn${i===0?' active':''}" data-tab="${t.id}">${t.label}</button>`).join('');
  tabsEl.querySelectorAll('.detail-tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      tabsEl.querySelectorAll('.detail-tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
      panelsEl.querySelectorAll('.detail-tab-panel').forEach(p=>p.classList.remove('active'));
      document.getElementById('panel-'+btn.dataset.tab)?.classList.add('active');
    });
  });

  // Build panels
  panelsEl.innerHTML='';

  // EPISODES panel
  if(mediaType==='tv'){
    const seasons=(d.seasons||[]).filter(s=>s.season_number>0);
    const panel=document.createElement('div');panel.id='panel-episodes';panel.className='detail-tab-panel active';
    panel.innerHTML=`
      <div class="season-select-wrap">
        <div class="season-select-label" id="ep-season-title">Season 1</div>
        ${seasons.length>1?`<select class="season-dropdown" id="ep-season-select">${seasons.map(s=>`<option value="${s.season_number}">${esc(s.name)}</option>`).join('')}</select>`:''}
        <div style="margin-left:auto;font-size:13px;color:#666">${d.number_of_episodes||''} episodes total</div>
      </div>
      <div class="episodes-list" id="episodes-list"><div class="loading-state"><div class="spinner"></div> Loading episodes…</div></div>`;
    panelsEl.appendChild(panel);
    loadEpisodesPanel(1,d.id);
    panel.querySelector('#ep-season-select')?.addEventListener('change',function(){
      const s=parseInt(this.value,10);
      document.getElementById('ep-season-title').textContent=`Season ${s}`;
      loadEpisodesPanel(s,d.id);
    });
  }

  // CAST panel
  const castPanel=document.createElement('div');castPanel.id='panel-cast';castPanel.className=`detail-tab-panel${mediaType!=='tv'?' active':''}`;
  const cast=(credits?.cast||[]).slice(0,18);
  castPanel.innerHTML=`<div class="cast-grid">${cast.map(p=>`
    <div class="cast-card">
      ${p.profile_path?`<img class="cast-photo" src="${IMG_BASE}w185${p.profile_path}" alt="${esc(p.name)}" loading="lazy">`:`<div class="cast-photo no-poster" style="aspect-ratio:2/3">${esc(p.name).charAt(0)}</div>`}
      <div class="cast-name">${esc(p.name)}</div>
      <div class="cast-character">${esc(p.character||'')}</div>
    </div>`).join('')}</div>`;
  panelsEl.appendChild(castPanel);

  // RELATED panel
  const relPanel=document.createElement('div');relPanel.id='panel-related';relPanel.className='detail-tab-panel';
  const relItems=(related?.results||[]).filter(r=>r.poster_path).slice(0,18);
  relPanel.innerHTML=`<div class="related-grid">${relItems.map(r=>`
    <div class="related-card" onclick="navigateToDetail(${r.id},'${mediaType}')">
      <img src="${IMG_BASE}w342${r.poster_path}" alt="${esc(r.title||r.name||'')}" loading="lazy">
      <div class="related-card-info">
        <div class="related-card-title">${esc(r.title||r.name||'')}</div>
        <div class="related-card-year">${(r.release_date||r.first_air_date||'').slice(0,4)}</div>
      </div>
    </div>`).join('')}${!relItems.length?'<div style="color:#666;padding:24px">No similar titles found.</div>':''}</div>`;
  panelsEl.appendChild(relPanel);

  // DETAILS panel
  const detPanel=document.createElement('div');detPanel.id='panel-details';detPanel.className='detail-tab-panel';
  const statusColor={Released:'#46d369',Ended:'#e87c26','In Production':'#54b3d6','Returning Series':'#46d369'}[d.status]||'#b3b3b3';
  detPanel.innerHTML=`
    <div class="detail-info-box">
      <div>
        <div class="info-row"><div class="info-label">Status</div><div class="info-value" style="color:${statusColor}">${esc(d.status||'—')}</div></div>
        ${mediaType==='movie'?`<div class="info-row"><div class="info-label">Release Date</div><div class="info-value">${esc(d.release_date||'—')}</div></div>`:`<div class="info-row"><div class="info-label">First Air Date</div><div class="info-value">${esc(d.first_air_date||'—')}</div></div>`}
        ${mediaType==='movie'&&d.budget?`<div class="info-row"><div class="info-label">Budget</div><div class="info-value">$${formatNumber(d.budget)}</div></div>`:''}
        ${mediaType==='movie'&&d.revenue?`<div class="info-row"><div class="info-label">Revenue</div><div class="info-value">$${formatNumber(d.revenue)}</div></div>`:''}
        ${mediaType==='tv'?`<div class="info-row"><div class="info-label">Network</div><div class="info-value">${(d.networks||[]).map(n=>esc(n.name)).join(', ')||'—'}</div></div>`:''}
        <div class="info-row"><div class="info-label">Original Language</div><div class="info-value">${esc((d.original_language||'').toUpperCase()||'—')}</div></div>
      </div>
      <div>
        <div class="info-row"><div class="info-label">Genres</div><div class="info-value">${(d.genres||[]).map(g=>esc(g.name)).join(', ')||'—'}</div></div>
        ${mediaType==='movie'&&d.production_countries?.length?`<div class="info-row"><div class="info-label">Country</div><div class="info-value">${d.production_countries.map(c=>esc(c.name)).join(', ')}</div></div>`:''}
        <div class="info-row"><div class="info-label">Rating</div><div class="info-value" style="color:#46d369">★ ${d.vote_average?.toFixed(1)||'—'} <span style="color:#666;font-size:12px">(${formatNumber(d.vote_count)} votes)</span></div></div>
        <div class="info-row"><div class="info-label">TMDB ID</div><div class="info-value">${mediaId}</div></div>
      </div>
    </div>`;
  panelsEl.appendChild(detPanel);
}

async function loadEpisodesPanel(season,showId){
  const listEl=document.getElementById('episodes-list');if(!listEl)return;
  listEl.innerHTML='<div class="loading-state"><div class="spinner"></div> Loading…</div>';
  try{
    const data=await tmdb(`/tv/${showId}/season/${season}`);
    const episodes=data.episodes||[];
    if(!episodes.length){listEl.innerHTML='<div style="color:#666;padding:16px">No episodes found.</div>';return;}
    listEl.innerHTML='';
    episodes.forEach(ep=>{
      const item=document.createElement('div');item.className='episode-item';
      const thumb=ep.still_path?`${IMG_BASE}w300${ep.still_path}`:'';
      item.innerHTML=`
        <div class="ep-thumb">
          ${thumb?`<img src="${thumb}" alt="Episode ${ep.episode_number}" loading="lazy">`:'<div class="no-poster" style="height:100%">'+ep.episode_number+'</div>'}
          <div class="ep-thumb-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        </div>
        <div class="ep-info">
          <div class="ep-header">
            <div class="ep-title">${ep.episode_number}. ${esc(ep.name||'Episode '+ep.episode_number)}</div>
            ${ep.runtime?`<div class="ep-runtime">${formatRuntime(ep.runtime)}</div>`:''}
          </div>
          ${ep.overview?`<div class="ep-overview">${esc(ep.overview)}</div>`:''}
        </div>`;
      item.addEventListener('click',()=>{
        currentSeason=season;currentEpisode=ep.episode_number;playNow();
      });
      listEl.appendChild(item);
    });
  }catch(err){listEl.innerHTML=`<div style="color:#666;padding:16px">Failed to load episodes.</div>`;}
}

function navigateToDetail(id,type){
  window.location.href=`/title?id=${id}&type=${type}`;
}

/* HEADER SCROLL */
window.addEventListener('scroll',()=>{
  document.getElementById('nf-header').classList.toggle('scrolled',window.scrollY>80);
},{passive:true});

/* KEYBOARD */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closePlayer();
});

/* PLAYER EVENTS */
document.getElementById('player-close').addEventListener('click',closePlayer);
document.getElementById('player-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closePlayer();});
document.getElementById('season-select')?.addEventListener('change',function(){
  playerState.season=parseInt(this.value,10);currentSeason=playerState.season;
  loadEpisodesForPlayer(playerState.season);
  setPlayerSrcFromState();
  document.getElementById('player-subtitle').textContent=`Season ${playerState.season} · Episode ${playerState.episode}`;
});
document.getElementById('episode-select')?.addEventListener('change',function(){
  playerState.episode=parseInt(this.value,10);currentEpisode=playerState.episode;
  setPlayerSrcFromState();
  document.getElementById('player-subtitle').textContent=`Season ${playerState.season} · Episode ${playerState.episode}`;
});

/* INIT */
loadDetail();
</script>
